name: CI

on:
  push:
    branches: ["main"]
  pull_request:
  workflow_dispatch:
  schedule:
    - cron: "17 3 * * *"

permissions:
  contents: read

jobs:
  lint:
    name: lint (ruff + mypy)
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up uv
        uses: astral-sh/setup-uv@v3

      - name: Install dependencies
        run: uv sync --all-groups

      - name: Run ruff check
        run: uv run ruff check src/ tests/

      - name: Run mypy strict
        run: uv run mypy --strict src/mobius/

      - name: Run import lint
        run: uv run scripts/lint_imports.py

  test:
    name: test (pytest + chaos)
    runs-on: ubuntu-latest
    env:
      MOBIUS_LLM_MODE: mock
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up uv
        uses: astral-sh/setup-uv@v3

      - name: Install dependencies
        run: uv sync --all-groups

      - name: Run pytest
        run: uv run pytest -q

      - name: Run v3a product matrix explicitly with mock LLM
        run: uv run pytest tests/e2e/test_v3a_product_matrix.py -q --no-cov

      - name: Verify project grade remains Gold
        run: uv run mobius grade

      - name: Run workflow smoke gate
        run: uv run mobius workflow smoke

      - name: Run cold-start gate
        run: uv run mobius cold-start

      - name: Verify v2 core directories are untouched
        run: |
          set -euo pipefail
          if [ -n "$(git diff --stat -- src/mobius/workflow src/mobius/persistence src/mobius/agents)" ]; then
            git diff --stat -- src/mobius/workflow src/mobius/persistence src/mobius/agents
            exit 1
          fi

      - name: Run chaos suite
        run: uv run pytest tests/chaos/ -q

  v3a-real-llm-nightly:
    name: v3a real LLM integration (opt-in nightly)
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    env:
      MOBIUS_LLM_MODE: real
      MOBIUS_RUN_REAL_LLM: ${{ secrets.MOBIUS_RUN_REAL_LLM }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up uv
        uses: astral-sh/setup-uv@v3

      - name: Install dependencies
        run: uv sync --all-groups

      - name: Run opt-in real LLM integration
        run: uv run pytest tests/integration/test_v3a_real_llm.py -q --no-cov

  build:
    name: build (uv build + smoke)
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up uv
        uses: astral-sh/setup-uv@v3

      - name: Install dependencies
        run: uv sync --all-groups

      - name: Build wheel and sdist
        run: uv build

      - name: Smoke install wheel
        run: |
          python -m venv /tmp/mobius-smoke
          /tmp/mobius-smoke/bin/pip install dist/*.whl
          MOBIUS_HOME="$(mktemp -d)" NO_COLOR=1 /tmp/mobius-smoke/bin/mobius --help

      - name: Verify wheel has no MCP dependency
        run: |
          if unzip -p dist/mobius-*.whl '*METADATA' | grep -i '^Requires-Dist:' | grep -i 'mcp'; then
            echo "Wheel METADATA must not declare an mcp dependency" >&2
            exit 1
          fi

  bench:
    name: bench (cold_start + status)
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up uv
        uses: astral-sh/setup-uv@v3

      - name: Install dependencies
        run: uv sync --all-groups

      - name: Run cold-start benchmark
        run: uv run python bench/cold_start.py

      - name: Run status benchmark
        run: uv run python bench/status.py
